# Plebian-OS preseed — a REGULAR Debian install that comes up as Pleb.
#
# This is a stock Debian 13 "trixie" install in every respect except two:
#   1. no desktop-environment task is selected (no XFCE/GNOME/KDE) — just the
#      "standard system utilities", plus the handful of packages the Pleb
#      session needs (Xorg, LightDM, git/curl/tar);
#   2. a late_command drops in the Plebian-OS first-boot provisioner, which on
#      first boot pulls pleb (and, via pleb, kilix) from GitHub and registers
#      the Pleb session in place of a desktop environment.
#
# Everything else is default Debian. Feed it to the trixie netinst installer
# (see build/remaster-iso.sh) or any preseed-driven install. Baseline follows
# Debian's example-preseed; only Plebian-specific lines are commented below.

### Localization (adjust to taste; these are safe defaults)
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string plebian
d-i netcfg/get_domain string localdomain

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Accounts — a normal user is created (Pleb runs as this uid-1000 account).
### CHANGE THESE before any real build; defaults are for unattended test VMs only.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Plebian User
d-i passwd/username string pleb
d-i passwd/user-password password plebian
d-i passwd/user-password-again password plebian
d-i user-setup/allow-password-weak boolean true

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning — guided, entire disk, all-in-one (test-VM friendly).
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base + apt
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true

### Tasksel — the crucial Plebian bit: STANDARD ONLY, no desktop task.
### (This is exactly where "the XFCE Debian install" would select the XFCE
### task; Plebian-OS omits it and lets the Pleb session take that role.)
tasksel tasksel/first multiselect standard, ssh-server

### The graphical base plus everything the kilix "95" desktop needs at runtime:
### the Pleb session's X stack, the desktop's Python/audio/media deps, and a
### build toolchain so programs (e.g. games) compile and run inside it. Pleb and
### kilix themselves still come from GitHub on first boot.
### (libxkbcommon-x11-0 + libxcb-xkb1 are what kitty's glfw-x11 backend dlopens
### at runtime — a no-desktop base lacks them and kilix would crash on launch.)
d-i pkgsel/include string xserver-xorg xinit lightdm x11-xserver-utils x11-utils \
    xterm git curl tar ca-certificates sudo libgl1 libegl1 \
    libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
    fonts-jetbrains-mono fonts-noto-color-emoji network-manager \
    python3-pil python3-xlib python3-websockets \
    pulseaudio pulseaudio-utils alsa-utils ffmpeg xauth firefox-esr chromium \
    xvfb tigervnc-standalone-server tigervnc-common x11-xkb-utils xfonts-base \
    build-essential zlib1g-dev
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### late_command — install the Plebian-OS provisioner + first-boot unit into the
### target system and enable it. The provisioner (and the GitHub clones) run on
### the first real boot, not in the installer chroot: the user exists, the
### network is up via NetworkManager, and clones land with correct ownership.
###
### The files it copies are staged into the installer environment by the ISO
### remaster (build/remaster-iso.sh copies them to /cdrom/plebian-os/).
d-i preseed/late_command string \
    mkdir -p /target/usr/local/sbin /target/etc/systemd/system; \
    cp /cdrom/plebian-os/plebian-os-provision.sh /target/usr/local/sbin/plebian-os-provision; \
    chmod 0755 /target/usr/local/sbin/plebian-os-provision; \
    cp /cdrom/plebian-os/plebian-os-firstboot.service /target/etc/systemd/system/plebian-os-firstboot.service; \
    in-target systemctl enable plebian-os-firstboot.service; \
    true
