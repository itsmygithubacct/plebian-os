# Plebian-OS preseed — a REGULAR Debian install that comes up as Pleb.
#
# This is a stock Debian 13 "trixie" install in every respect except two:
#   1. no desktop-environment task is selected (no XFCE/GNOME/KDE) — just the
#      "standard system utilities", plus the handful of packages the Pleb
#      session needs (Xorg, LightDM, git/curl/tar);
#   2. a late_command drops in the Plebian-OS first-boot provisioner, which on
#      first boot pulls pleb (and, via pleb, kilix) from GitHub and registers
#      the Pleb session in place of a desktop environment.
#
# Everything else is default Debian. Baseline follows Debian's example-preseed;
# only Plebian-specific lines are commented below.
#
# NOTE: the committed template ships NO account password and NO ssh-server on
# purpose. Build images through the tooling — build/make-usb.sh,
# build/remaster-iso.sh, or build/build_usb_image.py / build_vm_image.py — which
# inject a hashed password and, for the VM builder, an ssh-server task. Fed to a
# plain debian-installer with no builder, this file prompts for the account
# password interactively and leaves disk partitioning to the installer, so it is
# safe by default. Do NOT feed this file straight to debian-installer expecting a
# hands-off unattended install — it deliberately is not one.

### Localization (adjust to taste; these are safe defaults)
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string plebian
d-i netcfg/get_domain string localdomain

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Accounts — a normal user is created (Pleb runs as this uid-1000 account).
### The committed template ships NO account password on purpose: the image
### builders (build_vm_image.py / build_usb_image.py) replace the sentinel below
### with a hashed password, and a plain debian-installer with no builder prompts
### for it interactively. Set one explicitly only for a throwaway test image.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Plebian User
d-i passwd/username string pleb
# @PLEBIAN_OS_PASSWORD@ — image builders replace this line with a hashed password.

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning — guided, entire disk, all-in-one (test-VM friendly).
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base + apt
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true

### Tasksel — the crucial Plebian bit: STANDARD ONLY, no desktop task.
### (This is exactly where "the XFCE Debian install" would select the XFCE
### task; Plebian-OS omits it and lets the Pleb session take that role.)
### No ssh-server by default — the VM builder adds it (it needs SSH to watch
### provisioning); a plain install / USB stick ships without an open sshd.
tasksel tasksel/first multiselect standard

### The graphical base plus everything the kilix "95" desktop needs at runtime:
### the Pleb session's X stack, the desktop's Python/audio/media deps, and a
### build toolchain so programs (e.g. games) compile and run inside it. Pleb and
### kilix themselves still come from GitHub on first boot.
### (libxkbcommon-x11-0 + libxcb-xkb1 are what kitty's glfw-x11 backend dlopens
### at runtime — a no-desktop base lacks them and kilix would crash on launch.)
d-i pkgsel/include string xserver-xorg xinit lightdm x11-xserver-utils x11-utils \
    xterm git curl tar ca-certificates sudo network-manager \
    bash python3 coreutils findutils grep sed gawk diffutils procps util-linux \
    libgl1 libegl1 \
    libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
    fonts-jetbrains-mono fonts-noto-color-emoji \
    python3-pil python3-xlib python3-websockets \
    pulseaudio pulseaudio-utils alsa-utils fluidsynth fluid-soundfont-gm \
    ffmpeg xauth zenity firefox-esr chromium \
    dbus-user-session dbus-x11 xfce4-notifyd libnotify-bin xdg-desktop-portal xdg-desktop-portal-gtk \
    xvfb tigervnc-standalone-server tigervnc-common x11-xkb-utils xfonts-base \
    build-essential pkg-config golang-go python3-dev zlib1g-dev \
    libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
    libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev libxcb-xkb-dev libdbus-1-dev \
    libgl1-mesa-dev libfontconfig-dev \
    libsdl2-dev libsdl2-image-dev libsndfile1-dev libfluidsynth-dev \
    tmux ncdu rsync ufw jq glances
d-i pkgsel/upgrade select full-upgrade
### Match install-deps.sh's --no-install-recommends so the Debian-installer path
### and the re-runnable installer resolve the SAME package closure (the drift
### test asserts the explicit set; this keeps the actual installed set aligned).
d-i pkgsel/install-recommends boolean false
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### late_command — install the Plebian-OS provisioner + first-boot unit into the
### target system and enable it. The provisioner (and the GitHub clones) run on
### the first real boot, not in the installer chroot: the user exists, the
### network is up via NetworkManager, and clones land with correct ownership.
###
### The files it copies are staged into the installer environment by the ISO
### remaster (build/remaster-iso.sh copies them to /cdrom/plebian-os/).
d-i preseed/late_command string \
    mkdir -p /target/usr/local/sbin /target/usr/local/bin /target/etc/systemd/system /target/etc/plebian-os; \
    cp /cdrom/plebian-os/plebian-os-provision.sh /target/usr/local/sbin/plebian-os-provision; \
    chmod 0755 /target/usr/local/sbin/plebian-os-provision; \
    cp /cdrom/plebian-os/install-deps.sh /target/usr/local/sbin/plebian-os-install-deps; \
    chmod 0755 /target/usr/local/sbin/plebian-os-install-deps; \
    cp /cdrom/plebian-os/plebian-os-update.sh /target/usr/local/bin/plebian-os-update; \
    chmod 0755 /target/usr/local/bin/plebian-os-update; \
    mkdir -p /target/etc/systemd/system.conf.d; \
    printf '%s\n' '# Managed by Plebian-OS. Keep boot/login scope status lines off tty1.' '[Manager]' 'ShowStatus=no' > /target/etc/systemd/system.conf.d/50-plebian-os-quiet-console.conf; \
    if [ -f /cdrom/plebian-os/build-info.env ]; then cp /cdrom/plebian-os/build-info.env /target/etc/plebian-os/build-info.env; fi; \
    if [ -f /cdrom/plebian-os/firstboot.env ]; then mkdir -p /target/etc/default; cp /cdrom/plebian-os/firstboot.env /target/etc/default/plebian-os; fi; \
    cp /cdrom/plebian-os/plebian-os-firstboot.service /target/etc/systemd/system/plebian-os-firstboot.service; \
    in-target systemctl enable plebian-os-firstboot.service; \
    true
